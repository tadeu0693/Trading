<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Trading Assistant IA</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#080c14" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TradeIA" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:       #080c14;
      --bg2:      #0d1422;
      --bg3:      #111d30;
      --border:   #1a2840;
      --accent:   #00e5a0;
      --accent2:  #0057ff;
      --red:      #ff3d5a;
      --yellow:   #f5c400;
      --text:     #dde6f0;
      --text2:    #5a7a9a;
      --mono:     'Space Mono', monospace;
      --sans:     'DM Sans', sans-serif;
      --radius:   14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow: hidden;
    }

    /* ── APP SHELL ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 10px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-hex {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      animation: pulse-hex 3s ease-in-out infinite;
    }

    @keyframes pulse-hex {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.4) drop-shadow(0 0 8px var(--accent)); }
    }

    .logo-text {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.05em;
      line-height: 1.1;
    }

    .logo-sub {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text2);
      letter-spacing: 0.12em;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text2);
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text2);
      transition: all 0.3s;
    }

    .status-dot.live {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: blink 1.2s ease-in-out infinite;
    }

    .status-dot.analyzing {
      background: var(--yellow);
      box-shadow: 0 0 8px var(--yellow);
    }

    .status-dot.error { background: var(--red); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── TELA PREVIEW ── */
    #screen-section {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
    }

    #screen-preview-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #050810;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #screen-video {
      width: 100%; height: 100%;
      object-fit: contain;
      display: none;
    }

    #screen-canvas {
      display: none;
    }

    .screen-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: var(--text2);
    }

    .screen-placeholder .icon {
      font-size: 40px;
      filter: grayscale(0.5);
    }

    .screen-placeholder p {
      font-family: var(--mono);
      font-size: 10px;
      text-align: center;
      letter-spacing: 0.08em;
      line-height: 1.6;
    }

    /* Overlay de análise em andamento */
    .analyzing-overlay {
      position: absolute;
      inset: 0;
      background: rgba(8, 12, 20, 0.75);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      backdrop-filter: blur(2px);
    }

    .analyzing-overlay.show { display: flex; }

    .scan-line {
      width: 80%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scan 1.5s ease-in-out infinite;
    }

    @keyframes scan {
      0% { transform: translateY(-60px); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(60px); opacity: 0; }
    }

    .analyzing-overlay span {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 0.15em;
    }

    /* Timer badge */
    #timer-badge {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(0,0,0,0.7);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 3px 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      display: none;
    }

    /* ── CONTROLES ── */
    #controls {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: 10px;
      padding: 11px 8px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { transform: scale(0.95); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent2), #0088ff);
      color: white;
    }

    .btn-live {
      background: linear-gradient(135deg, #00b377, var(--accent));
      color: #080c14;
    }

    .btn-live.active {
      background: linear-gradient(135deg, var(--red), #cc1133);
      color: white;
    }

    .btn-snap {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn:disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* ── QUICK ACTIONS ── */
    #quick-actions {
      display: flex;
      gap: 6px;
      padding: 8px 14px;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    #quick-actions::-webkit-scrollbar { display: none; }

    .quick-btn {
      flex-shrink: 0;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .quick-btn:active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      transform: scale(0.95);
    }

    /* ── CHAT ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 3px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg {
      max-width: 88%;
      animation: msg-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(12px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }
    .msg.system { align-self: center; max-width: 100%; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      line-height: 1.6;
    }

    .user .msg-bubble {
      background: linear-gradient(135deg, var(--accent2), #0077ee);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .assistant .msg-bubble {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
      font-family: var(--sans);
      white-space: pre-wrap;
    }

    .system .msg-bubble {
      background: rgba(0,229,160,0.07);
      border: 1px solid rgba(0,229,160,0.2);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 10px;
      text-align: center;
      border-radius: 8px;
      letter-spacing: 0.05em;
    }

    .msg-time {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text2);
      margin-top: 4px;
      padding: 0 4px;
    }

    .user .msg-time { text-align: right; }

    /* Typing indicator */
    .typing-bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
    }

    .typing-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: typing 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Sinal de trading */
    .signal-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-top: 6px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .signal-badge {
      font-size: 28px;
      flex-shrink: 0;
    }

    .signal-info {
      flex: 1;
      font-family: var(--mono);
      font-size: 10px;
    }

    .signal-label {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .signal-label.buy { color: var(--accent); }
    .signal-label.sell { color: var(--red); }
    .signal-label.neutral { color: var(--yellow); }

    /* ── INPUT ── */
    #input-area {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      background: var(--bg2);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 11px 16px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    #msg-input:focus { border-color: var(--accent2); }
    #msg-input::placeholder { color: var(--text2); }

    #send-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.2s;
    }

    #send-btn:active { transform: scale(0.88); }

    /* ── INTERVAL PICKER ── */
    #interval-bar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #interval-bar.show { display: flex; }

    #interval-bar span {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text2);
      flex-shrink: 0;
    }

    .interval-opt {
      padding: 5px 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--bg3);
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
    }

    .interval-opt.active, .interval-opt:active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 18px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
      pointer-events: none;
      opacity: 0;
      transition: all 0.3s;
      z-index: 100;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-hex">⬡</div>
      <div>
        <div class="logo-text">TRADING IA</div>
        <div class="logo-sub">MONITOR DE TELA</div>
      </div>
    </div>
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">OFFLINE</span>
    </div>
  </header>

  <!-- PREVIEW DA TELA -->
  <div id="screen-section">
    <div id="screen-preview-wrap">
      <div class="screen-placeholder" id="placeholder">
        <div class="icon">📱</div>
        <p>TOQUE EM "COMPARTILHAR TELA"<br/>PARA INICIAR O MONITORAMENTO</p>
      </div>
      <video id="screen-video" autoplay muted playsinline></video>
      <canvas id="screen-canvas"></canvas>
      <div class="analyzing-overlay" id="analyzing-overlay">
        <div class="scan-line"></div>
        <span>ANALISANDO...</span>
      </div>
      <div id="timer-badge">--s</div>
    </div>
  </div>

  <!-- CONTROLES PRINCIPAIS -->
  <div id="controls">
    <button class="btn btn-primary" id="btn-share" onclick="startScreenShare()">
      📲 COMPARTILHAR TELA
    </button>
    <button class="btn btn-live" id="btn-live" onclick="toggleLive()" disabled>
      ▶ AO VIVO
    </button>
    <button class="btn btn-snap" id="btn-snap" onclick="snapAnalyze()" disabled>
      📸
    </button>
  </div>

  <!-- INTERVALO (aparece quando live está ativo) -->
  <div id="interval-bar">
    <span>A CADA:</span>
    <div class="interval-opt active" data-sec="15" onclick="setInterval_(this)">15s</div>
    <div class="interval-opt" data-sec="30" onclick="setInterval_(this)">30s</div>
    <div class="interval-opt" data-sec="60" onclick="setInterval_(this)">1min</div>
    <div class="interval-opt" data-sec="120" onclick="setInterval_(this)">2min</div>
  </div>

  <!-- AÇÕES RÁPIDAS -->
  <div id="quick-actions">
    <div class="quick-btn" onclick="quickAsk('📈 Tendência atual?')">📈 Tendência</div>
    <div class="quick-btn" onclick="quickAsk('⚡ Tem sinal de entrada ou saída agora?')">⚡ Sinal</div>
    <div class="quick-btn" onclick="quickAsk('🎯 Quais são os suportes e resistências principais?')">🎯 Suporte/Resist.</div>
    <div class="quick-btn" onclick="quickAsk('📊 Como estão os indicadores? RSI, MACD, médias?')">📊 Indicadores</div>
    <div class="quick-btn" onclick="quickAsk('🕯️ Tem algum padrão de candle importante?')">🕯️ Padrões</div>
    <div class="quick-btn" onclick="quickAsk('💡 Qual sua opinião geral sobre esse ativo agora?')">💡 Opinião geral</div>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div class="msg system">
      <div class="msg-bubble">⬡ TRADING ASSISTANT IA PRONTO<br/>Compartilhe sua tela para análise ao vivo</div>
    </div>
  </div>

  <!-- INPUT -->
  <div id="input-area">
    <input type="text" id="msg-input" placeholder="Pergunte sobre o gráfico..." />
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  // ── ESTADO ──
  let mediaStream = null;
  let liveInterval = null;
  let intervalSecs = 15;
  let countdown = 0;
  let countdownTimer = null;
  let isAnalyzing = false;
  let conversationHistory = [];
  let lastFrameB64 = null;

  const video = document.getElementById('screen-video');
  const canvas = document.getElementById('screen-canvas');
  const ctx = canvas.getContext('2d');
  const chat = document.getElementById('chat');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const analyzingOverlay = document.getElementById('analyzing-overlay');
  const timerBadge = document.getElementById('timer-badge');
  const placeholder = document.getElementById('placeholder');
  const btnLive = document.getElementById('btn-live');
  const btnSnap = document.getElementById('btn-snap');
  const btnShare = document.getElementById('btn-share');

  // ── CAPTURA DE TELA ──
  async function startScreenShare() {
    try {
      // Para stream anterior
      if (mediaStream) {
        mediaStream.getTracks().forEach(t => t.stop());
      }

      mediaStream = await navigator.mediaDevices.getDisplayMedia({
        video: { frameRate: 5, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });

      video.srcObject = mediaStream;
      video.style.display = 'block';
      placeholder.style.display = 'none';

      setStatus('live', 'CONECTADO');
      btnLive.disabled = false;
      btnSnap.disabled = false;
      btnShare.textContent = '🔄 TROCAR TELA';

      showToast('✅ Tela conectada!');
      addMessage('system', '📲 Tela compartilhada com sucesso!\nUse "▶ AO VIVO" para análise contínua ou "📸" para snapshot.');

      // Quando usuário para o compartilhamento
      mediaStream.getVideoTracks()[0].onended = () => {
        stopLive();
        setStatus('', 'OFFLINE');
        btnLive.disabled = true;
        btnSnap.disabled = true;
        video.style.display = 'none';
        placeholder.style.display = 'flex';
        btnShare.textContent = '📲 COMPARTILHAR TELA';
        addMessage('system', '⚠️ Compartilhamento de tela encerrado.');
      };

    } catch (err) {
      if (err.name !== 'AbortError') {
        showToast('❌ Erro ao compartilhar tela');
        addMessage('system', '❌ Não foi possível acessar a tela.\nVerifique as permissões do navegador.');
      }
    }
  }

  // ── CAPTURA FRAME ──
  function captureFrame() {
    if (!mediaStream || !video.videoWidth) return null;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    // Reduz para economizar tokens (~720p → 640px)
    const maxW = 640;
    if (canvas.width > maxW) {
      const ratio = maxW / canvas.width;
      const tmp = document.createElement('canvas');
      tmp.width = maxW;
      tmp.height = Math.round(canvas.height * ratio);
      tmp.getContext('2d').drawImage(canvas, 0, 0, tmp.width, tmp.height);
      return tmp.toDataURL('image/jpeg', 0.82).split(',')[1];
    }

    return canvas.toDataURL('image/jpeg', 0.82).split(',')[1];
  }

  // ── ANÁLISE ──
  async function analyzeScreen(userText) {
    if (isAnalyzing) return;
    isAnalyzing = true;

    const frame = captureFrame();
    if (!frame) {
      addMessage('system', '⚠️ Sem imagem da tela. Compartilhe a tela primeiro.');
      isAnalyzing = false;
      return;
    }

    lastFrameB64 = frame;
    analyzingOverlay.classList.add('show');
    setStatus('analyzing', 'ANALISANDO');

    const messages = buildMessages(frame, userText);

    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });

      const data = await res.json();

      if (data.content && data.content[0]) {
        const reply = data.content[0].text;

        // Salva histórico (sem imagens para não acumular)
        conversationHistory.push({ role: 'user', content: userText });
        conversationHistory.push({ role: 'assistant', content: reply });
        if (conversationHistory.length > 16) conversationHistory = conversationHistory.slice(-16);

        addMessage('assistant', reply);
      } else {
        addMessage('system', '❌ Erro na API: ' + (data.error?.message || 'Resposta inválida'));
      }

    } catch (err) {
      addMessage('system', '❌ Falha na conexão: ' + err.message);
    }

    analyzingOverlay.classList.remove('show');
    setStatus('live', mediaStream ? 'CONECTADO' : 'OFFLINE');
    isAnalyzing = false;
  }

  function buildMessages(frame, userText) {
    const msgs = [];

    // Histórico de texto
    for (const h of conversationHistory.slice(-6)) {
      msgs.push(h);
    }

    // Mensagem atual com imagem
    msgs.push({
      role: 'user',
      content: [
        {
          type: 'image',
          source: { type: 'base64', media_type: 'image/jpeg', data: frame }
        },
        { type: 'text', text: userText }
      ]
    });

    return msgs;
  }

  // ── LIVE MODE ──
  function toggleLive() {
    if (liveInterval) {
      stopLive();
    } else {
      startLive();
    }
  }

  function startLive() {
    document.getElementById('interval-bar').classList.add('show');
    btnLive.textContent = '⏹ PARAR';
    btnLive.classList.add('active');
    addMessage('system', `⏱ Monitoramento ao vivo ativado — análise a cada ${intervalSecs}s`);

    // Análise imediata
    addMessage('user', '🔴 AO VIVO — análise automática iniciada');
    analyzeScreen('Análise automática: descreva o que vê no app da corretora. Identifique o ativo, tendência, indicadores e dê seu sinal.');

    startCountdown();
  }

  function stopLive() {
    if (liveInterval) { clearInterval(liveInterval); liveInterval = null; }
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
    document.getElementById('interval-bar').classList.remove('show');
    btnLive.textContent = '▶ AO VIVO';
    btnLive.classList.remove('active');
    timerBadge.style.display = 'none';
    addMessage('system', '⏹ Monitoramento ao vivo pausado.');
  }

  function startCountdown() {
    countdown = intervalSecs;
    timerBadge.style.display = 'block';
    timerBadge.textContent = `${countdown}s`;

    if (countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(() => {
      countdown--;
      timerBadge.textContent = `${countdown}s`;
      if (countdown <= 0) {
        clearInterval(countdownTimer);
        if (!isAnalyzing) {
          analyzeScreen('Atualização ao vivo: o que mudou? Novo sinal? Mudança de tendência?');
        }
        setTimeout(startCountdown, 500);
      }
    }, 1000);
  }

  function setInterval_(el) {
    document.querySelectorAll('.interval-opt').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    intervalSecs = parseInt(el.dataset.sec);

    if (liveInterval || countdownTimer) {
      stopLive();
      setTimeout(startLive, 300);
    }
  }

  // ── SNAPSHOT ──
  function snapAnalyze() {
    addMessage('user', '📸 Analisando snapshot da tela...');
    analyzeScreen('Faça uma análise técnica completa do que está na tela: ativo, tendência, suportes, resistências, indicadores, padrões e sinal de trading.');
  }

  // ── QUICK ACTIONS ──
  function quickAsk(text) {
    if (!mediaStream) {
      showToast('⚠️ Compartilhe a tela primeiro!');
      return;
    }
    addMessage('user', text);
    analyzeScreen(text);
  }

  // ── CHAT ──
  function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';

    addMessage('user', text);

    if (!mediaStream) {
      // Sem tela, só texto
      analyzeTextOnly(text);
    } else {
      analyzeScreen(text);
    }
  }

  async function analyzeTextOnly(text) {
    const msgs = [...conversationHistory.slice(-6), { role: 'user', content: text }];

    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: msgs })
      });
      const data = await res.json();
      if (data.content?.[0]) {
        const reply = data.content[0].text;
        conversationHistory.push({ role: 'user', content: text });
        conversationHistory.push({ role: 'assistant', content: reply });
        addMessage('assistant', reply);
      }
    } catch (err) {
      addMessage('system', '❌ Erro: ' + err.message);
    }
  }

  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });

  function addMessage(role, text) {
    const now = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    if (role === 'assistant') {
      div.innerHTML = `
        <div class="msg-bubble">${text}</div>
        <div class="msg-time">${now} · IA</div>`;
    } else if (role === 'user') {
      div.innerHTML = `
        <div class="msg-bubble">${text}</div>
        <div class="msg-time">${now}</div>`;
    } else {
      div.innerHTML = `<div class="msg-bubble">${text}</div>`;
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function setStatus(type, label) {
    statusDot.className = 'status-dot ' + type;
    statusText.textContent = label;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Service Worker para PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
